<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Boarding Pass - Aero Map & Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Aero Map & Shop"
            style="width: 120px; border-radius: 12px; margin-bottom: 15px;">
        <h1>Welcome, {{ user.userinfo.name if user.userinfo else 'Passenger' }}!</h1>
        <p>Enter your PNR (booking reference) to load your boarding pass and enter the terminal.</p>

        {% if error %}
        <div
            style="background: rgba(208, 60, 56, 0.2); border: 1px solid #d03c38; padding: 12px; border-radius: 8px; margin-bottom: 20px; color: #ff685b;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/boarding" method="POST" style="margin-top: 30px;">
            <div class="form-group">
                <label for="pnr">PNR / Booking Reference</label>
                <input type="text" id="pnr" name="pnr" placeholder="e.g. LG3KZP"
                    style="text-transform: uppercase; letter-spacing: 3px; font-size: 1.3rem; text-align: center;"
                    maxlength="6" required>
            </div>

            <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">
                Load Boarding Pass
            </button>
        </form>

        <p style="margin-top: 30px; font-size: 0.8rem; color: #666;">
            Demo PNRs: LG3KZP, QZ8P9C, H7L4TN, R2M7FX, C9V3JD
        </p>
    </div>
</body>

</html>
